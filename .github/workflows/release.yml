name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
  AWS_DEFAULT_REGION: auto

jobs:
  build:
    environment: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build web client
        run: |
          cd web
          npm ci
          npm run build

      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o build/myairouter-linux-amd64 .

      - name: Build Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o build/myairouter-linux-arm64 .

      - name: Compress
        run: |
          cd build
          tar czf myairouter-linux-amd64.tar.gz myairouter-linux-amd64
          tar czf myairouter-linux-arm64.tar.gz myairouter-linux-arm64

      - name: Generate checksums
        run: cd build && sha256sum *.tar.gz > checksums.txt

      - name: Generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || [ "$VERSION" = "main" ]; then
            VERSION=$(grep 'myairouter v[0-9]' main.go | sed 's/.*myairouter v//' | sed 's/[^0-9.]*//g')
          fi
          echo "{\"version\":\"$VERSION\",\"url\":\"${{ vars.R2_PUBLIC_URL }}/releases\"}" > build/latest.json

      - name: Upload to Cloudflare R2
        run: |
          aws s3 sync build/ "s3://${{ secrets.R2_BUCKET }}/releases/" --no-progress

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.tar.gz
            build/checksums.txt
          generate_release_notes: true

      - name: Purge Cloudflare cache
        if: vars.CF_ZONE_ID != ''
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          curl -fsSL -X POST "https://api.cloudflare.com/client/v4/zones/${{ vars.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"prefixes":["releases/"]}'
